<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tienda Virtual TechNova</title>
    <meta
      name="description"
      content="Tienda virtual interactiva de tecnologia con carrito dinamico usando JavaScript orientado a objetos."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Sora:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <!-- Elementos decorativos de fondo -->
    <div class="bg-shape bg-shape--left" aria-hidden="true"></div>
    <div class="bg-shape bg-shape--right" aria-hidden="true"></div>

    <!-- Encabezado principal de la tienda -->
    <header class="hero container">
      <p class="eyebrow">Tienda virtual</p>
      <h1>TechNova Store</h1>
      <p class="hero__subtitle">
        Descubre tecnologia seleccionada para productividad, gaming y estudio.
        Agrega productos al carrito y gestiona tu compra en tiempo real.
      </p>
    </header>

    <!-- Layout principal: catalogo + carrito -->
    <main class="container layout" id="app-root">
      <!-- Catalogo con filtros y resultados dinamicos -->
      <section class="catalogo" aria-labelledby="catalogo-title">
        <div class="section-head">
          <h2 id="catalogo-title">Catalogo</h2>
          <div class="filtros" id="filtros-panel">
            <label for="filtro-categoria" class="sr-only">Filtrar por categoria</label>
            <select id="filtro-categoria">
              <option value="todos">Todas las categorias</option>
            </select>

            <label for="buscar-producto" class="sr-only">Buscar producto</label>
            <input
              type="search"
              id="buscar-producto"
              placeholder="Buscar por nombre"
              autocomplete="off"
            />
          </div>
        </div>

        <div id="catalogo-grid" class="catalogo__grid" aria-live="polite"></div>
      </section>

      <!-- Panel lateral del carrito -->
      <aside class="carrito" aria-labelledby="carrito-title">
        <div class="carrito__header">
          <h2 id="carrito-title">Tu carrito</h2>
          <button id="btn-vaciar" class="btn btn--ghost" type="button">Vaciar carrito</button>
        </div>

        <div id="carrito-items" class="carrito__items" aria-live="polite"></div>

        <div class="carrito__footer">
          <p>Total</p>
          <strong id="carrito-total">$0.00</strong>
        </div>

        <button id="btn-comprar" class="btn btn--buy" type="button">Comprar ahora</button>
      </aside>
    </main>

    <!-- Template usado cuando el carrito esta vacio -->
    <template id="empty-cart-template">
      <p class="carrito__empty">Tu carrito esta vacio. Agrega productos del catalogo.</p>
    </template>

    <!-- Script principal de la aplicacion -->
    <script type="module" src="assets/js/main.js"></script>
  </body>
</html>
